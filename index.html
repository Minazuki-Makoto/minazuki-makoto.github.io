<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>陈乐瑶的个人主页</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(120deg, #89f7fe, #66a6ff);
      color: #333;
    }

    .container {
      max-width: 800px;
      margin: 80px auto;
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
      text-align: center;
    }

    h1 {
      margin-top: 0;
      font-size: 36px;
    }

    p {
      font-size: 18px;
      line-height: 1.8;
    }

    .tag {
      display: inline-block;
      margin: 6px;
      padding: 6px 14px;
      background: #f0f4ff;
      border-radius: 20px;
      font-size: 14px;
    }

    footer {
      margin-top: 30px;
      font-size: 14px;
      color: #777;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>你好，我是 陈乐瑶 👋</h1>

    <p>
      研究方向：强化学习 / 能源管理<br>
      目前关注：PPO、SAC、CEMS、HEMS
    </p>

    <div>
      <span class="tag">Reinforcement Learning</span>
      <span class="tag">PPO</span>
      <span class="tag">SAC</span>
      <span class="tag">PyTorch</span>
    </div>

    <footer>
      <p>
        GitHub：<a href="https://github.com/minazuki-makoto" target="_blank">
        minazuki-makoto</a>
      </p>
    </footer>
  </div>
</body>
</html>
